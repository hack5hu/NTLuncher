name: ESLint

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  schedule:
    - cron: '17 22 * * 2'  # Runs every Tuesday at 22:17 UTC

jobs:
  eslint:
    name: Run ESLint Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read  # Needed for private repos to get Action run status

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # Ensure compatibility with your project

      - name: Cache Yarn Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.yarn  # ✅ Correct cache path for Yarn
          key: ${{ runner.os }}-node-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile  # ✅ Ensures dependency consistency

      - name: Install ESLint and Formatter
        run: |
          yarn add eslint@latest --dev
          yarn add @microsoft/eslint-formatter-sarif@latest --dev
          yarn add eslint-config-prettier eslint-plugin-prettier --dev  # ✅ Prevent ESLint & Prettier conflicts

      - name: Run ESLint Check
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: yarn eslint . \
          --config .eslintrc.js \
          --ext .js,.jsx,.ts,.tsx \
          --format @microsoft/eslint-formatter-sarif \
          --output-file eslint-results.sarif
        continue-on-error: true  # Allows workflow to continue even if errors are found

      - name: Upload Analysis Results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
