name: ESLint

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  schedule:
    - cron: '17 22 * * 2'  # Runs every Tuesday at 22:17 UTC

jobs:
  eslint:
    name: Run ESLint Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read  # Needed for private repos to get Action run status

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # Ensure compatibility with your project

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: ~/.yarn
          key: ${{ runner.os }}-node-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: yarn install --frozen-lockfile  # Faster and ensures consistency

      - name: Verify ESLint Config Exists
        run: ls -lah .eslintrc.js || echo ".eslintrc.js NOT FOUND"

      - name: Install ESLint and Formatter
        run: |
          yarn add eslint@latest eslint-plugin-react@latest eslint-plugin-prettier@latest eslint-config-prettier@latest --dev
          yarn add @microsoft/eslint-formatter-sarif@latest --dev

      - name: Run ESLint Check
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          echo "Running ESLint..."
          yarn eslint . \
            --config .eslintrc.js \
            --ext .js,.jsx,.ts,.tsx \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif || echo "ESLint failed!"

          echo "Checking if SARIF file exists..."
          ls -lah eslint-results.sarif || echo "eslint-results.sarif NOT FOUND"

      - name: Upload Analysis Results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
